<!DOCTYPE html>

<html>
<head>
<title>Bouncing Ball</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.ball {
width: 80px;
height: 80px;
background-color: blue;
border-radius: 50%;
animation: bounce 1s ease-in-out infinite alternate;
}

@keyframes bounce {
from {
transform: translateY(0);
}
to {
transform: translateY(-200px);
}
} </style>

</head>

<body>
<div class="ball"></div>
</body>
</html>
