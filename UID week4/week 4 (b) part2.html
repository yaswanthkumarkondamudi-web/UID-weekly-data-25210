<!DOCTYPE html>
<html>
    <body>
        <form>
            <h1 style="text-align: center; color:black;">USER REGISTRATION FORM</h1>
            <table border="1" align="center" cellspacing="0" cellpadding="8" style="background-color: whitesmoke;">
                <tr>
                    <td>Full name:</td>
                    <td><input type="text" name="fullname" placeholder="Enter full name"></td>
                </tr>
                <tr>
                    <td>E-mail:</td>
                    <td><input type="email" name="email" placeholder="Enter email"></td>
                </tr>
                <tr>
                    <td>Phone Number:</td>
                    <td><input type="number" name="phone" placeholder="Enter phone number"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password" placeholder="Enter password"></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="Register" style="cursor: pointer;"> <input type="reset" value="Reset" style="cursor: pointer;"></td>
                </tr>
        </form>
    </body>
</html>
