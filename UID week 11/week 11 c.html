<!DOCTYPE html>
<html>
<head>
    <title>Password Strength</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h3 {
            margin-bottom: 15px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #667eea;
        }
        .msg {
            margin-top: 12px;
            font-weight: bold;
            font-size: 16px;
        }
        .weak { color: #e74c3c; }
        .medium { color: #f39c12; }
        .strong { color: #2ecc71; }
    </style>
</head>
<body>
<div class="box">
    <h3>Password Strength</h3>
    <input type="password" id="pass" placeholder="Enter password">
    <div id="msg" class="msg"></div>
</div>
<script>
    var pass = document.getElementById("pass");
    var msg = document.getElementById("msg");
    pass.addEventListener("input", function () {
        var value = pass.value;
        if (value.length === 0) {
            msg.textContent = "";
        }
        else if (value.length < 6) {
            msg.textContent = "Weak";
            msg.className = "msg weak";
        }
        else if (
            /[A-Z]/.test(value) && 
            /[a-z]/.test(value) &&   
            /[0-9]/.test(value) &&   
            /[^A-Za-z0-9]/.test(value) 
        ) {
            msg.textContent = "Strong";
            msg.className = "msg strong";
        }
        else {
            msg.textContent = "Medium";
            msg.className = "msg medium";
        }
    });
</script>
</body>
</html>
