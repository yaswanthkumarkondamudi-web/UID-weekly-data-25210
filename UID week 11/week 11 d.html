<!DOCTYPE html>
<html>
<head>
    <title>Mobile Validation</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            margin: 0;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h3 {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            outline: none;
        }
        .msg {
            margin-top: 12px;
            font-weight: bold;
        }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="box">
    <h3>Mobile Number</h3>
    <input type="text" id="mobile" placeholder="Enter 10-digit number">
    <div id="msg" class="msg"></div>
</div>
<script>
    var mobile = document.getElementById("mobile");
    var msg = document.getElementById("msg");
    mobile.addEventListener("blur", function () {
        var value = mobile.value.trim();
        if (value === "") {
            msg.textContent = "";
        }
        else if (value.length === 10 && !isNaN(value)) {
            msg.textContent = "Valid Mobile Number ✔";
            msg.className = "msg success";
        }
        else {
            msg.textContent = "Enter exactly 10 digits";
            msg.className = "msg error";
        }
    });
</script>
</body>
</html>
