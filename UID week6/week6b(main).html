<!DOCTYPE html>
<html>
<head>
<style>
body{
display:grid;
grid-template-rows:auto auto 1fr auto;
grid-template-columns:200px 1fr;
grid-template-areas:
"header header"
"sale sale"
"sidebar contents"
"footer footer";
gap:10px;
font-family:Arial;
background:#f8fafc;
}
.header{
grid-area:header;
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}
.sale{
grid-area:sale;
background:#2563eb;
color:white;
padding:10px;
overflow:hidden;
white-space:nowrap;
}
.sale span{
display:inline-block;
padding-left:100%;
animation:scroll 15s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
.sidebar{
grid-area:sidebar;
background:#e0e7ff;
padding:20px;
}

.sidebar a{
display:block;
margin:10px 0;
text-decoration:none;
color:black;
font-weight:bold;
}

.sidebar a:hover{
color:#1e3a8a;
}
.contents{
grid-area:contents;
background:#f0f4ff;
padding:20px;
}

iframe{
width:100%;
height:500px;
border:none;
}
.footer{
grid-area:footer;
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}
</style>
</head>
<body>
<div class="header">
<h1>My E-Commerce Website</h1>
</div>
<div class="sale">
<span>🔥Welcome to MY E-COMMERCE | BIG SALE — UP TO 50% OFF ON ALL PRODUCTS |*conditions apply 🔥</span>
</div>
<div class="sidebar">
<h3>Categories</h3>
<a href="electronics week6(b).html" target="products">Electronics</a>
<a href="clothing week6(b).html" target="products">Clothing</a>
<a href="books week6(b).html" target="products">Books</a>
<a href="sports week6(b).html" target="products">Sports</a>
</div>
<div class="contents">
<iframe name="products" src="electronics week6(b).html"></iframe>
</div>
<div class="footer">
© 2026 My E-Commerce Website | All rights reserved.   
</div>
</body>
</html>
