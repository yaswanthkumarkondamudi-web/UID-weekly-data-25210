<!DOCTYPE html>
<html>
<head>
    <title>Sign of Product</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        input {
            width: 85%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            outline: none;
        }
        input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74,144,226,0.4);
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #4a90e2;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #357abd;
            transform: scale(1.05);
        }
    </style>
    <script>
        function findSign() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);
            let c = parseFloat(document.getElementById("num3").value);

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert("Please enter all three numbers!");
                return;
            }

            let product = a * b * c;

            if (product > 0) {
                alert("The sign is + (Positive)");
            } else if (product < 0) {
                alert("The sign is - (Negative)");
            } else {
                alert("The product is 0");
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Sign of Product</h2>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <input type="number" id="num3" placeholder="Enter third number">
        <button onclick="findSign()">Check Sign</button>
    </div>
</body>
</html>
