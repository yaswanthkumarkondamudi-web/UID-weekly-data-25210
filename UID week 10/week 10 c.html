<!DOCTYPE html>
<html>
<head>
    <title>Find Largest Number</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: linear-gradient(45deg, #feb47b, #ff7e5f);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Largest of 5 Numbers</h2>
    <input type="number" id="n1" placeholder="Enter number 1">
    <input type="number" id="n2" placeholder="Enter number 2">
    <input type="number" id="n3" placeholder="Enter number 3">
    <input type="number" id="n4" placeholder="Enter number 4">
    <input type="number" id="n5" placeholder="Enter number 5">
    <button onclick="findLargest()">Find Largest</button>
</div>
<script>
function findLargest() {
    let a = Number(document.getElementById("n1").value);
    let b = Number(document.getElementById("n2").value);
    let c = Number(document.getElementById("n3").value);
    let d = Number(document.getElementById("n4").value);
    let e = Number(document.getElementById("n5").value);
    let largest;
    if (a >= b && a >= c && a >= d && a >= e) {
        largest = a;
    } else if (b >= a && b >= c && b >= d && b >= e) {
        largest = b;
    } else if (c >= a && c >= b && c >= d && c >= e) {
        largest = c;
    } else if (d >= a && d >= b && d >= c && d >= e) {
        largest = d;
    } else {
        largest = e;
    }
    alert("The largest number is: " + largest);
}
</script>
</body>
</html>
