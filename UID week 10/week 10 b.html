<!DOCTYPE html>
<html>
<head>
    <title>Sort Three Numbers</title>
    <style>
        body {
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8e2de2, #ff6a00);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 {
            margin-bottom: 20px;
        }
        input {
            width: 85%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input::placeholder {
            color: #ddd;
        }
        input:focus {
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(255,106,0,0.7);
        }
    </style>
    <script>
        function sortNumbers() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);
            let c = parseFloat(document.getElementById("num3").value);
            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert("Please enter all three numbers!");
                return;
            }
            let arr = [a, b, c];
            arr.sort(function(x, y) {
                return x - y;
            });
            alert("Sorted numbers (Ascending): " + arr.join(", "));
        }
    </script>
</head>
<body>
    <div class="container">
        <h2> Sort Three Numbers</h2>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <input type="number" id="num3" placeholder="Enter third number">
        <button onclick="sortNumbers()">Sort Numbers</button>
    </div>
</body>
</html>
